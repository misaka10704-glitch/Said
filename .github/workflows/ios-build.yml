name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.route }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - route: ipad
            scheme: Said-iPad
            run_tests: false
          - route: iphone
            scheme: Said-iPhone
            run_tests: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build ${{ matrix.scheme }}
        run: |
          xcodebuild \
            -scheme "${{ matrix.scheme }}" \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      # SaidTests host is Said-iPhone (moved off Said-iPad in 0d5182e).
      - name: Unit tests (iPhone route)
        if: matrix.run_tests
        run: |
          xcodebuild \
            -scheme Said-iPhone \
            -destination 'platform=iOS Simulator,name=iPad (A16)' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test
